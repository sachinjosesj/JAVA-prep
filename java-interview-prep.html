<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Interview Prep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
    --accent:#58a6ff;--accent2:#3fb950;--warn:#d29922;--danger:#f85149;
    --text:#e6edf3;--muted:#8b949e;--tag-bg:#1f3d6e;--purple:#bc8cff;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  /* HEADER */
  header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-height:54px;}
  .logo{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--tag-bg);padding:3px 9px;border-radius:4px;}
  .header-title{font-size:14px;font-weight:600;}
  .header-sub{font-size:11px;color:var(--muted);margin-left:auto;}
  /* LAYOUT */
  .layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px);}
  /* SIDEBAR */
  .sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
  .sidebar-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);padding:8px 14px 4px;text-transform:uppercase;}
  .day-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:none;border:none;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;transition:all .15s;border-left:3px solid transparent;}
  .day-btn:hover{background:var(--surface2);color:var(--text);}
  .day-btn.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent);}
  .day-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;background:var(--surface2);color:var(--muted);padding:2px 5px;border-radius:3px;min-width:26px;text-align:center;}
  .day-btn.active .day-num{background:var(--tag-bg);color:var(--accent);}
  /* MAIN */
  .main{flex:1;overflow-y:auto;padding:20px 24px;max-width:820px;}
  /* DAY HEADER */
  .day-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);font-family:'JetBrains Mono',monospace;}
  .day-title{font-size:20px;font-weight:700;margin-top:4px;line-height:1.2;}
  .day-desc{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;}
  .stats-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .stat-chip{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
  .stat-chip.easy{border-color:#238636;color:var(--accent2);}
  .stat-chip.medium{border-color:#bb8009;color:var(--warn);}
  .stat-chip.hard{border-color:#da3633;color:var(--danger);}
  /* TABS */
  .tab-bar{display:flex;gap:2px;margin:16px 0 0;border-bottom:1px solid var(--border);}
  .tab-btn{padding:7px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-content{padding-top:20px;}
  /* LEARN SECTION */
  .learn-section{display:flex;flex-direction:column;gap:16px;}
  .topic-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .topic-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}
  .topic-header:hover{background:var(--surface2);}
  .topic-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:20px;}
  .topic-title{font-size:14px;font-weight:600;flex:1;}
  .topic-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
  .tag-concept{background:#1f3d6e;color:var(--accent);}
  .tag-code{background:#1c2d1e;color:var(--accent2);}
  .tag-pattern{background:#2d2000;color:var(--warn);}
  .tag-gotcha{background:#2d1318;color:var(--danger);}
  .topic-chevron{color:var(--muted);font-size:11px;transition:transform .2s;}
  .topic-card.open .topic-chevron{transform:rotate(90deg);}
  .topic-body{display:none;padding:0 14px 16px 14px;border-top:1px solid var(--border);}
  .topic-card.open .topic-body{display:block;}
  .topic-intro{font-size:13px;color:#c9d1d9;line-height:1.75;margin-top:14px;}
  .topic-intro p{margin-bottom:10px;}
  .topic-intro ul{padding-left:18px;margin:8px 0;}
  .topic-intro ul li{margin-bottom:5px;}
  .topic-intro ol{padding-left:18px;margin:8px 0;}
  .topic-intro ol li{margin-bottom:5px;}
  /* CODE BLOCK */
  .code-block{background:#010409;border:1px solid var(--border);border-radius:6px;margin:12px 0;overflow:hidden;}
  .code-label{font-size:10px;font-weight:700;color:var(--muted);padding:6px 12px;background:var(--surface2);border-bottom:1px solid var(--border);letter-spacing:.5px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:space-between;}
  .code-body{padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;overflow-x:auto;color:#e6edf3;}
  .kw{color:#ff7b72;}    /* keywords */
  .cl{color:#ffa657;}    /* class names */
  .fn{color:#d2a8ff;}    /* function names */
  .st{color:#a5d6ff;}    /* strings */
  .cm{color:#8b949e;}    /* comments */
  .an{color:#79c0ff;}    /* annotations */
  .nm{color:#f0883e;}    /* numbers */
  /* CALLOUTS */
  .callout{border-radius:0 5px 5px 0;padding:10px 12px;margin:12px 0;font-size:12px;line-height:1.6;}
  .callout-tip{background:#0d2818;border-left:3px solid var(--accent2);color:#7ee787;}
  .callout-warn{background:#271d00;border-left:3px solid var(--warn);color:#e3b341;}
  .callout-info{background:#0d1f3c;border-left:3px solid var(--accent);color:#79c0ff;}
  .callout-danger{background:#2d1418;border-left:3px solid var(--danger);color:#ff7b72;}
  .callout b{font-weight:700;}
  /* CONCEPT GRID */
  .concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
  .concept-cell{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
  .concept-cell-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .concept-cell-val{font-size:12px;line-height:1.5;color:var(--text);}
  /* COMPARISON TABLE */
  .cmp-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;}
  .cmp-table th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);}
  .cmp-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
  .cmp-table tr:last-child td{border-bottom:none;}
  /* Q&A */
  .qa-list{display:flex;flex-direction:column;gap:10px;}
  .qa-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s;}
  .qa-card:hover{border-color:#444c56;}
  .qa-question{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none;}
  .q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:22px;padding-top:1px;}
  .q-text{font-size:13px;font-weight:500;flex:1;line-height:1.4;}
  .q-chevron{color:var(--muted);font-size:11px;margin-top:2px;transition:transform .2s;}
  .qa-card.open .q-chevron{transform:rotate(90deg);}
  .qa-answer{display:none;padding:0 14px 14px 46px;font-size:13px;line-height:1.7;color:#c9d1d9;border-top:1px solid var(--border);padding-top:12px;}
  .qa-card.open .qa-answer{display:block;}
  .qa-answer code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface2);padding:2px 5px;border-radius:3px;color:#79c0ff;}
  .qa-answer pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:12px;color:#79c0ff;line-height:1.6;}
  .qa-answer ul{padding-left:16px;margin:6px 0;}
  .qa-answer ul li{margin-bottom:4px;}
  .qa-answer .tip{background:#0d2818;border-left:3px solid var(--accent2);padding:7px 10px;border-radius:0 4px 4px 0;margin-top:8px;font-size:12px;color:#7ee787;}
  .qa-answer .note{background:#271d00;border-left:3px solid var(--warn);padding:7px 10px;border-radius:0 4px 4px 0;margin-top:8px;font-size:12px;color:#e3b341;}
  .difficulty{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase;margin-left:auto;white-space:nowrap;}
  .difficulty.easy{background:#1c2d1e;color:var(--accent2);}
  .difficulty.medium{background:#2d2000;color:var(--warn);}
  .difficulty.hard{background:#2d1318;color:var(--danger);}
  /* AI EVAL */
  .ai-section{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .ai-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .ai-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .ai-label{font-size:13px;font-weight:600;color:var(--accent);}
  .ai-sublabel{font-size:11px;color:var(--muted);margin-left:auto;}
  .ai-body{padding:14px;}
  .ai-select-q{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:7px 10px;border-radius:6px;margin-bottom:8px;outline:none;}
  .ai-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s;}
  .ai-textarea:focus{border-color:var(--accent);}
  .ai-btn{margin-top:8px;padding:8px 16px;background:var(--accent);color:#0d1117;border:none;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .ai-btn:hover{opacity:.85;}
  .ai-btn:disabled{opacity:.4;cursor:not-allowed;}
  .ai-response{margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;line-height:1.7;color:#c9d1d9;display:none;white-space:pre-wrap;}
  /* SCHEDULE */
  .schedule-section{display:flex;flex-direction:column;gap:16px;}
  .schedule-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .schedule-card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .schedule-card-title{font-size:13px;font-weight:600;}
  .schedule-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;margin-left:auto;}
  .badge-week1{background:#1f3d6e;color:var(--accent);}
  .badge-week2{background:#1c2d1e;color:var(--accent2);}
  .badge-rule{background:#2d2000;color:var(--warn);}
  .schedule-table{width:100%;border-collapse:collapse;}
  .schedule-table tr:not(:last-child) td{border-bottom:1px solid var(--border);}
  .schedule-table td{padding:9px 14px;font-size:13px;vertical-align:top;}
  .schedule-table td:first-child{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;width:55%;}
  .schedule-table td:last-child{font-weight:500;}
  .schedule-table tr.total-row td{background:var(--surface2);font-weight:700;}
  .schedule-table tr.total-row td:last-child{color:var(--accent);}
  .split-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
  .split-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;}
  .split-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .split-hours{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);}
  .split-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .rule-box{padding:14px;}
  .rule-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
  .rule-item:last-child{border-bottom:none;padding-bottom:0;}
  .rule-icon{font-size:16px;min-width:24px;text-align:center;}
  .rule-text{font-size:12px;line-height:1.5;}
  .rule-text strong{color:var(--text);}
  .rule-text span{color:var(--muted);}
  /* TOOLS */
  .tools-section{display:flex;flex-direction:column;gap:16px;}
  .tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tool-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:6px;}
  .tool-header{display:flex;align-items:center;gap:8px;}
  .tool-icon{font-size:20px;}
  .tool-name{font-size:13px;font-weight:600;}
  .tool-cat{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:auto;text-transform:uppercase;letter-spacing:.5px;}
  .cat-practice{background:#1f3d6e;color:var(--accent);}
  .cat-learn{background:#1c2d1e;color:var(--accent2);}
  .cat-setup{background:#2d2000;color:var(--warn);}
  .cat-ref{background:#1d1d3d;color:var(--purple);}
  .tool-desc{font-size:12px;color:var(--muted);line-height:1.5;}
  .tool-why{font-size:12px;color:var(--text);line-height:1.5;}
  .tool-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;margin-top:4px;font-weight:500;}
  .tool-link:hover{text-decoration:underline;}
  /* DIVIDER */
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  /* SCROLLBAR */
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  @media(max-width:600px){
    .sidebar{width:54px;min-width:54px;}
    .day-btn span.day-label{display:none;}
    .main{padding:14px;}
    .tools-grid,.concept-grid,.split-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">&lt;/&gt; JavaPrep</div>
  <div class="header-title">Interview Prep — 14 Day Plan</div>
  <div class="header-sub">7 YOE · Spring Boot · Microservices</div>
</header>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>
<script>
const DAYS = [
  // ─────────────────────────────────────────────
  // DAY 1
  // ─────────────────────────────────────────────
  {
    day:1, date:"Sat, Jun 13", title:"Java Basics",
    desc:"OOP pillars, Collections, Exception Handling — the foundation.",
    topics:[
      {
        title:"The 4 Pillars of OOP",tag:"concept",
        body:`
<div class="topic-intro">
<p>Every Java interview starts here. You must be able to explain each pillar in plain English, give an example, and say <b>why it matters</b>.</p>

<b>1. Encapsulation — Hiding data</b>
<p>Bundle related data (fields) and behaviour (methods) into one class, and restrict direct access to the data using <code>private</code>. Others interact only through public methods.</p>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Encapsulation</div>
  <div class="code-body"><span class="kw">public class</span> <span class="cl">BankAccount</span> {
    <span class="kw">private double</span> balance;          <span class="cm">// hidden — no one touches this directly</span>

    <span class="kw">public void</span> <span class="fn">deposit</span>(<span class="kw">double</span> amount) {
        <span class="kw">if</span> (amount &gt; <span class="nm">0</span>) balance += amount;  <span class="cm">// validation lives here</span>
    }

    <span class="kw">public double</span> <span class="fn">getBalance</span>() { <span class="kw">return</span> balance; }
}</div>
</div>
<div class="callout callout-tip">💡 Why it matters: Without encapsulation, any code could set <code>balance = -9999</code>. Encapsulation keeps objects in a valid state.</div>

<div class="topic-intro">
<b>2. Inheritance — Reusing behaviour</b>
<p>A child class (<code>extends</code>) acquires all non-private fields and methods of the parent, and can add or override behaviour.</p>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Inheritance</div>
  <div class="code-body"><span class="kw">class</span> <span class="cl">Animal</span> {
    <span class="kw">void</span> <span class="fn">breathe</span>() { System.out.println(<span class="st">"Breathing"</span>); }
}

<span class="kw">class</span> <span class="cl">Dog</span> <span class="kw">extends</span> <span class="cl">Animal</span> {          <span class="cm">// inherits breathe()</span>
    <span class="kw">void</span> <span class="fn">bark</span>() { System.out.println(<span class="st">"Woof!"</span>); }
}

<span class="cl">Dog</span> dog = <span class="kw">new</span> <span class="cl">Dog</span>();
dog.breathe(); <span class="cm">// works! inherited from Animal</span>
dog.bark();    <span class="cm">// Dog's own method</span></div>
</div>

<div class="topic-intro">
<b>3. Polymorphism — One interface, many forms</b>
<p>Two types: <b>Runtime polymorphism</b> (method overriding — which method runs is decided at runtime by the actual object type) and <b>Compile-time</b> (method overloading — same name, different parameters).</p>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Runtime Polymorphism (Overriding)</div>
  <div class="code-body"><span class="kw">class</span> <span class="cl">Shape</span> {
    <span class="kw">void</span> <span class="fn">draw</span>() { System.out.println(<span class="st">"Drawing shape"</span>); }
}
<span class="kw">class</span> <span class="cl">Circle</span> <span class="kw">extends</span> <span class="cl">Shape</span> {
    <span class="an">@Override</span>
    <span class="kw">void</span> <span class="fn">draw</span>() { System.out.println(<span class="st">"Drawing circle"</span>); }
}

<span class="cl">Shape</span> s = <span class="kw">new</span> <span class="cl">Circle</span>();  <span class="cm">// reference type = Shape, actual = Circle</span>
s.draw();  <span class="cm">// prints "Drawing circle" — runtime decides!</span></div>
</div>

<div class="topic-intro">
<b>4. Abstraction — Hiding complexity</b>
<p>Show only what's necessary, hide the how. Achieved via <code>abstract</code> classes or interfaces.</p>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Abstraction</div>
  <div class="code-body"><span class="kw">abstract class</span> <span class="cl">Payment</span> {
    <span class="kw">abstract void</span> <span class="fn">pay</span>(<span class="kw">double</span> amount); <span class="cm">// WHAT to do — no implementation</span>
}

<span class="kw">class</span> <span class="cl">CreditCardPayment</span> <span class="kw">extends</span> <span class="cl">Payment</span> {
    <span class="kw">void</span> <span class="fn">pay</span>(<span class="kw">double</span> amount) {
        <span class="cm">// HOW to do it — hidden behind the abstract contract</span>
        System.out.println(<span class="st">"Charging card: "</span> + amount);
    }
}</div>
</div>
<div class="callout callout-info">ℹ️ <b>Abstraction vs Encapsulation:</b> Abstraction hides <b>complexity</b> (what's happening). Encapsulation hides <b>data</b> (the state). Both hide things, but different things.</div>`
      },
      {
        title:"Interface vs Abstract Class",tag:"concept",
        body:`
<div class="topic-intro">
<p>One of the most common interview questions. The key is to know not just the differences but <b>when to use each</b>.</p>
</div>
<table class="cmp-table">
  <tr><th>Feature</th><th>Abstract Class</th><th>Interface</th></tr>
  <tr><td>Inheritance</td><td>Single (extends one)</td><td>Multiple (implements many)</td></tr>
  <tr><td>Fields</td><td>Can have instance fields (state)</td><td>Only public static final constants</td></tr>
  <tr><td>Constructor</td><td>Yes</td><td>No</td></tr>
  <tr><td>Methods</td><td>Abstract + concrete</td><td>Abstract + default + static (Java 8+)</td></tr>
  <tr><td>Access modifiers</td><td>Any</td><td>public only</td></tr>
</table>
<div class="code-block">
  <div class="code-label">WHEN TO USE — Abstract Class (shared state + behaviour)</div>
  <div class="code-body"><span class="kw">abstract class</span> <span class="cl">Vehicle</span> {
    <span class="kw">protected int</span> speed;           <span class="cm">// shared state</span>
    <span class="kw">void</span> <span class="fn">accelerate</span>() { speed += <span class="nm">10</span>; } <span class="cm">// shared behaviour</span>
    <span class="kw">abstract void</span> <span class="fn">fuelType</span>();       <span class="cm">// each subclass decides this</span>
}</div>
</div>
<div class="code-block">
  <div class="code-label">WHEN TO USE — Interface (capability/contract)</div>
  <div class="code-body"><span class="kw">interface</span> <span class="cl">Flyable</span> {
    <span class="kw">void</span> <span class="fn">fly</span>();
}
<span class="kw">interface</span> <span class="cl">Swimmable</span> {
    <span class="kw">void</span> <span class="fn">swim</span>();
}

<span class="cm">// Duck can fly AND swim — not possible with abstract class</span>
<span class="kw">class</span> <span class="cl">Duck</span> <span class="kw">implements</span> <span class="cl">Flyable</span>, <span class="cl">Swimmable</span> {
    <span class="kw">public void</span> <span class="fn">fly</span>()  { System.out.println(<span class="st">"Duck flying"</span>); }
    <span class="kw">public void</span> <span class="fn">swim</span>() { System.out.println(<span class="st">"Duck swimming"</span>); }
}</div>
</div>
<div class="callout callout-tip">💡 Rule of thumb: Use <b>abstract class</b> when classes share code. Use <b>interface</b> to define a capability any class can implement.</div>`

<div class="topic-intro">
<p>You'll use these every day. Know the internal structure, time complexity, and when to pick each.</p>
</div>
<table class="cmp-table">
  <tr><th>Class</th><th>Ordered?</th><th>Duplicates?</th><th>Null?</th><th>get(i)</th><th>contains</th></tr>
  <tr><td>ArrayList</td><td>Yes (insertion)</td><td>Yes</td><td>Yes</td><td>O(1)</td><td>O(n)</td></tr>
  <tr><td>LinkedList</td><td>Yes (insertion)</td><td>Yes</td><td>Yes</td><td>O(n)</td><td>O(n)</td></tr>
  <tr><td>HashSet</td><td>No</td><td>No</td><td>One null</td><td>—</td><td>O(1)</td></tr>
  <tr><td>TreeSet</td><td>Sorted</td><td>No</td><td>No</td><td>—</td><td>O(log n)</td></tr>
  <tr><td>HashMap</td><td>No</td><td>Keys: No</td><td>One null key</td><td>O(1)</td><td>O(1)</td></tr>
  <tr><td>LinkedHashMap</td><td>Yes (insertion)</td><td>Keys: No</td><td>One null key</td><td>O(1)</td><td>O(1)</td></tr>
</table>
<div class="code-block">
  <div class="code-label">EXAMPLE — Choosing the right collection</div>
  <div class="code-body"><span class="cm">// Need fast lookup by key → HashMap</span>
Map&lt;<span class="cl">String</span>, <span class="cl">User</span>&gt; userMap = <span class="kw">new</span> HashMap&lt;&gt;();
userMap.put(<span class="st">"sachin"</span>, user);
userMap.get(<span class="st">"sachin"</span>); <span class="cm">// O(1)</span>

<span class="cm">// Need unique emails → HashSet</span>
Set&lt;<span class="cl">String</span>&gt; emails = <span class="kw">new</span> HashSet&lt;&gt;();
emails.add(<span class="st">"a@b.com"</span>);
emails.contains(<span class="st">"a@b.com"</span>); <span class="cm">// O(1)</span>

<span class="cm">// Need ordered list, lots of reads → ArrayList</span>
List&lt;<span class="cl">String</span>&gt; names = <span class="kw">new</span> ArrayList&lt;&gt;();
names.add(<span class="st">"Alice"</span>);
names.get(<span class="nm">0</span>); <span class="cm">// O(1)</span></div>
</div>
<div class="callout callout-warn">⚠️ <b>hashCode() + equals() contract:</b> If two objects are equal (equals() returns true), they MUST have the same hashCode(). If you break this, HashSet/HashMap will silently malfunction.</div>`

<div class="topic-intro">
<p>Java has a structured exception hierarchy. Knowing checked vs unchecked is must-have knowledge.</p>
</div>
<div class="code-block">
  <div class="code-label">Exception Hierarchy</div>
  <div class="code-body">Throwable
├── Error            <span class="cm">// JVM-level: StackOverflowError, OutOfMemoryError (don't catch)</span>
└── Exception
    ├── IOException  <span class="cm">// CHECKED — compiler forces you to handle</span>
    ├── SQLException <span class="cm">// CHECKED</span>
    └── RuntimeException  <span class="cm">// UNCHECKED — compiler doesn't force handling</span>
        ├── NullPointerException
        ├── IllegalArgumentException
        └── IndexOutOfBoundsException</div>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — try/catch/finally + custom exception</div>
  <div class="code-body"><span class="cm">// Custom unchecked exception</span>
<span class="kw">public class</span> <span class="cl">UserNotFoundException</span> <span class="kw">extends</span> <span class="cl">RuntimeException</span> {
    <span class="kw">public</span> <span class="fn">UserNotFoundException</span>(<span class="cl">String</span> message) {
        <span class="kw">super</span>(message);
    }
}

<span class="cm">// Usage</span>
<span class="kw">public</span> <span class="cl">User</span> <span class="fn">findUser</span>(<span class="cl">Long</span> id) {
    <span class="kw">return</span> userRepo.findById(id)
        .orElseThrow(() -&gt; <span class="kw">new</span> <span class="cl">UserNotFoundException</span>(<span class="st">"User not found: "</span> + id));
}

<span class="cm">// try-catch-finally</span>
<span class="kw">try</span> {
    <span class="cl">User</span> u = <span class="fn">findUser</span>(<span class="nm">42L</span>);
} <span class="kw">catch</span> (<span class="cl">UserNotFoundException</span> e) {
    log.error(<span class="st">"Not found"</span>, e);
} <span class="kw">finally</span> {
    <span class="cm">// always runs — use for cleanup (closing resources)</span>
}</div>
</div>
<div class="callout callout-tip">💡 In Spring Boot, you almost never catch exceptions in service code — let them bubble up to <code>@ControllerAdvice</code> which handles them globally.</div>`

        title:"String Internals — Immutability & Pool",tag:"concept",
        body:`
<div class="topic-intro">
<p>Strings are the most used class in Java. Understanding why they're immutable and how the String pool works is essential.</p>
<p><b>Why is String immutable?</b></p>
<ul>
<li><b>Security</b> — Strings are used for class names, DB URLs, file paths. If mutable, code could tamper with them mid-flight.</li>
<li><b>String Pool</b> — JVM reuses string literals. If mutable, changing one reference would affect all others pointing to the same pool object.</li>
<li><b>Thread safety</b> — Immutable objects are inherently safe to share across threads.</li>
<li><b>HashCode caching</b> — Computed once and cached, since value never changes.</li>
</ul>
</div>
<div class="code-block">
  <div class="code-label">String Pool vs Heap</div>
  <div class="code-body"><span class="cl">String</span> a = <span class="st">"hello"</span>;            <span class="cm">// goes to String pool</span>
<span class="cl">String</span> b = <span class="st">"hello"</span>;            <span class="cm">// same pool object reused</span>
<span class="cl">String</span> c = <span class="kw">new</span> <span class="cl">String</span>(<span class="st">"hello"</span>); <span class="cm">// new heap object</span>

a == b        <span class="cm">// true  — same pool reference</span>
a == c        <span class="cm">// false — c is a separate heap object</span>
a.equals(c)   <span class="cm">// true  — same content</span>

<span class="cm">// RULE: Always use equals() for String comparison, never ==</span></div>
</div>
<div class="code-block">
  <div class="code-label">String vs StringBuilder vs StringBuffer</div>
  <div class="code-body"><span class="cm">// String — immutable, creates new object every concatenation</span>
<span class="cl">String</span> s = <span class="st">""</span>;
<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nm">0</span>; i &lt; <span class="nm">1000</span>; i++) s += i; <span class="cm">// creates 1000 String objects! Bad.</span>

<span class="cm">// StringBuilder — mutable, NOT thread-safe, FAST</span>
<span class="cl">StringBuilder</span> sb = <span class="kw">new</span> <span class="cl">StringBuilder</span>();
<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nm">0</span>; i &lt; <span class="nm">1000</span>; i++) sb.append(i); <span class="cm">// Good</span>
sb.toString();

<span class="cm">// StringBuffer — mutable, thread-safe, SLOW (synchronized)</span>
<span class="cm">// Only use when multiple threads share the same buffer</span></div>
</div>`

      {
        title:"Java Streams — Declarative Data Processing",tag:"code",
        body:`
<div class="topic-intro">
<p>Streams let you process collections in a pipeline style — filter, transform, collect. They replace verbose for-loops with clean, readable code.</p>
<p><b>Key concepts:</b></p>
<ul>
<li><b>Lazy</b> — intermediate operations don't execute until a terminal operation is called</li>
<li><b>Not reusable</b> — once a terminal op is called, the stream is consumed</li>
<li><b>Intermediate ops</b>: filter, map, flatMap, sorted, distinct, limit, peek</li>
<li><b>Terminal ops</b>: collect, forEach, count, reduce, findFirst, anyMatch, toList</li>
</ul>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Common Stream operations</div>
  <div class="code-body">List&lt;<span class="cl">String</span>&gt; names = List.of(<span class="st">"Alice"</span>, <span class="st">"Bob"</span>, <span class="st">"Anna"</span>, <span class="st">"Charlie"</span>);

<span class="cm">// Filter + map + collect</span>
List&lt;<span class="cl">String</span>&gt; result = names.stream()
    .filter(n -&gt; n.startsWith(<span class="st">"A"</span>))    <span class="cm">// ["Alice", "Anna"]</span>
    .map(<span class="cl">String</span>::toUpperCase)           <span class="cm">// ["ALICE", "ANNA"]</span>
    .sorted()                             <span class="cm">// ["ALICE", "ANNA"]</span>
    .collect(Collectors.toList());

<span class="cm">// Count</span>
<span class="kw">long</span> count = names.stream().filter(n -&gt; n.length() &gt; <span class="nm">3</span>).count();

<span class="cm">// findFirst</span>
Optional&lt;<span class="cl">String</span>&gt; first = names.stream()
    .filter(n -&gt; n.startsWith(<span class="st">"B"</span>))
    .findFirst(); <span class="cm">// Optional["Bob"]</span>

<span class="cm">// reduce — sum all lengths</span>
<span class="kw">int</span> total = names.stream()
    .mapToInt(<span class="cl">String</span>::length)
    .sum();

<span class="cm">// groupBy</span>
Map&lt;<span class="cl">Integer</span>, List&lt;<span class="cl">String</span>&gt;&gt; byLength = names.stream()
    .collect(Collectors.groupingBy(<span class="cl">String</span>::length));</div>
</div>
<div class="callout callout-tip">💡 In Spring Boot, you'll use streams constantly — filtering DB results, mapping entities to DTOs, grouping data.</div>`
      },
      {
        title:"Optional — Null Safety",tag:"code",
        body:`
<div class="topic-intro">
<p><code>Optional&lt;T&gt;</code> is a container that may or may not hold a value. It was introduced in Java 8 to make null handling explicit and eliminate accidental NullPointerExceptions.</p>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Optional patterns</div>
  <div class="code-body"><span class="cm">// Creating</span>
Optional&lt;<span class="cl">String</span>&gt; present = Optional.of(<span class="st">"hello"</span>);
Optional&lt;<span class="cl">String</span>&gt; empty   = Optional.empty();
Optional&lt;<span class="cl">String</span>&gt; maybe  = Optional.ofNullable(getValue()); <span class="cm">// null-safe</span>

<span class="cm">// Consuming safely</span>
present.ifPresent(v -&gt; System.out.println(v)); <span class="cm">// only runs if present</span>

<span class="cm">// Fallback values</span>
<span class="cl">String</span> val  = maybe.orElse(<span class="st">"default"</span>);                   <span class="cm">// always evaluated</span>
<span class="cl">String</span> val2 = maybe.orElseGet(() -&gt; fetchDefault());       <span class="cm">// lazy — only if empty</span>
<span class="cl">String</span> val3 = maybe.orElseThrow(() -&gt; <span class="kw">new</span> <span class="cl">RuntimeException</span>(<span class="st">"Missing"</span>));

<span class="cm">// Chaining (most common in Spring repos)</span>
<span class="cl">String</span> name = userRepo.findById(id)    <span class="cm">// returns Optional&lt;User&gt;</span>
    .map(<span class="cl">User</span>::getName)                <span class="cm">// Optional&lt;String&gt;</span>
    .orElse(<span class="st">"Unknown"</span>);</div>
</div>
<div class="callout callout-warn">⚠️ Don't use Optional as a method parameter or field. Only use it as a return type to signal "this might not be present".</div>`

};</div>

      {
        title:"Threads & Concurrency Basics",tag:"concept",
        body:`
<div class="topic-intro">
<p>Multithreading lets multiple tasks run concurrently. The challenge is <b>shared mutable state</b> — when two threads modify the same data, you get race conditions.</p>
</div>
<div class="code-block">
  <div class="code-label">Creating Threads — 3 Ways</div>
  <div class="code-body"><span class="cm">// 1. Extend Thread (avoid — limits inheritance)</span>
<span class="kw">class</span> <span class="cl">MyThread</span> <span class="kw">extends</span> <span class="cl">Thread</span> {
    <span class="kw">public void</span> <span class="fn">run</span>() { System.out.println(<span class="st">"Running"</span>); }
}
<span class="kw">new</span> <span class="cl">MyThread</span>().start();

<span class="cm">// 2. Implement Runnable (preferred)</span>
<span class="cl">Thread</span> t = <span class="kw">new</span> <span class="cl">Thread</span>(() -&gt; System.out.println(<span class="st">"Running"</span>));
t.start();

<span class="cm">// 3. ExecutorService (best for production)</span>
<span class="cl">ExecutorService</span> executor = Executors.newFixedThreadPool(<span class="nm">4</span>);
executor.submit(() -&gt; System.out.println(<span class="st">"Task running"</span>));
executor.shutdown();</div>
</div>
<div class="code-block">
  <div class="code-label">Race Condition — The Problem</div>
  <div class="code-body"><span class="kw">int</span> count = <span class="nm">0</span>;
<span class="cm">// Thread 1 and Thread 2 both do count++ simultaneously</span>
<span class="cm">// count++ is actually: read → increment → write (3 steps)</span>
<span class="cm">// Both threads can read the same value before either writes → count wrong!</span></div>
</div>
<div class="code-block">
  <div class="code-label">synchronized — The Fix</div>
  <div class="code-body"><span class="kw">public class</span> <span class="cl">Counter</span> {
    <span class="kw">private int</span> count = <span class="nm">0</span>;

    <span class="cm">// Only one thread can execute this at a time</span>
    <span class="kw">public synchronized void</span> <span class="fn">increment</span>() { count++; }
    <span class="kw">public synchronized int</span> <span class="fn">getCount</span>()    { <span class="kw">return</span> count; }
}

<span class="cm">// Better: use AtomicInteger — no locking, hardware-level atomicity</span>
<span class="cl">AtomicInteger</span> counter = <span class="kw">new</span> <span class="cl">AtomicInteger</span>(<span class="nm">0</span>);
counter.incrementAndGet(); <span class="cm">// thread-safe, faster than synchronized</span></div>
</div>
<div class="callout callout-info">ℹ️ <b>volatile</b> guarantees visibility (threads see latest value from main memory), but NOT atomicity. Use for simple boolean flags. Use AtomicInteger for counters.</div>`
      },
      {
        title:"JVM — Heap, Stack, GC",tag:"concept",
        body:`
<div class="topic-intro">
<p>You don't need to be a JVM expert, but you should understand memory layout and basic GC to discuss performance issues.</p>
</div>
<div class="code-block">
  <div class="code-label">JVM Memory Layout</div>
  <div class="code-body">JVM Memory
├── Heap (shared across threads — GC managed)
│   ├── Young Generation (Eden + Survivor spaces)
│   │   └── New objects start here. Minor GC cleans this.
│   └── Old Generation (Tenured)
│       └── Objects that survive many GCs move here. Major GC.
├── Stack (per thread)
│   └── Method frames, local variables, references
├── Metaspace (class metadata — replaced PermGen in Java 8)
└── Code Cache (compiled JIT code)</div>
</div>
<div class="code-block">
  <div class="code-label">What lives where</div>
  <div class="code-body"><span class="kw">void</span> <span class="fn">method</span>() {
    <span class="kw">int</span> x = <span class="nm">5</span>;               <span class="cm">// x lives on the STACK (primitive)</span>
    <span class="cl">String</span> s = <span class="st">"hi"</span>;         <span class="cm">// s reference on STACK, object on HEAP</span>
    <span class="cl">User</span> u = <span class="kw">new</span> <span class="cl">User</span>();     <span class="cm">// u reference on STACK, User object on HEAP</span>
}
<span class="cm">// When method ends, stack frame is popped. Heap objects become eligible for GC.</span></div>
</div>
<div class="concept-grid">
  <div class="concept-cell"><div class="concept-cell-label">StackOverflowError</div><div class="concept-cell-val">Stack too deep — infinite recursion or too many nested calls</div></div>
  <div class="concept-cell"><div class="concept-cell-label">OutOfMemoryError</div><div class="concept-cell-val">Heap full — too many objects, memory leak, pool size too small</div></div>
</div>`

      {q:"What does synchronized do? What problem does it solve?",d:"medium",a:`Ensures only one thread executes a block at a time — prevents race conditions on shared mutable state. Works via a monitor lock on the object. Prefer AtomicInteger or ReentrantLock for finer control.<div class="note">⚠️ synchronized on method locks the whole object. Can cause contention at scale.</div>`},
      {q:"What is volatile? When do you use it?",d:"hard",a:`Guarantees reads/writes go to main memory, not thread-local CPU cache. Ensures visibility. Does NOT make compound ops (i++) atomic. Use for simple boolean flags shared across threads. Use AtomicInteger for counters.`},

        title:"IoC and Dependency Injection",tag:"concept",
        body:`
<div class="topic-intro">
<p><b>IoC (Inversion of Control)</b> means the framework controls object creation, not your code. You don't say <code>new Service()</code> — Spring creates it and gives it to you.</p>
<p><b>Dependency Injection</b> is how IoC is implemented: Spring "injects" objects into your classes.</p>
<p>Why does this matter? Without DI, every class creates its own dependencies. This creates tight coupling — you can't swap implementations, testing is hard, and changing one class breaks others.</p>
</div>
<div class="code-block">
  <div class="code-label">Without DI — Tightly Coupled (Bad)</div>
  <div class="code-body"><span class="kw">class</span> <span class="cl">OrderService</span> {
    <span class="cm">// OrderService creates its own dependency — tightly coupled</span>
    <span class="kw">private</span> <span class="cl">PaymentService</span> paymentService = <span class="kw">new</span> <span class="cl">PaymentService</span>();

    <span class="cm">// Problem: Can't test without real PaymentService. Can't swap to MockPayment.</span>
}</div>
</div>
<div class="code-block">
  <div class="code-label">With DI — Loosely Coupled (Good)</div>
  <div class="code-body"><span class="an">@Service</span>
<span class="kw">class</span> <span class="cl">OrderService</span> {
    <span class="kw">private final</span> <span class="cl">PaymentService</span> paymentService;

    <span class="cm">// Spring injects PaymentService — OrderService doesn't create it</span>
    <span class="kw">public</span> <span class="fn">OrderService</span>(<span class="cl">PaymentService</span> paymentService) {
        <span class="kw">this</span>.paymentService = paymentService;
    }
}
<span class="cm">// In tests: inject MockPaymentService. In prod: inject real one. Zero code change.</span></div>
</div>
<div class="callout callout-tip">💡 Always prefer <b>constructor injection</b>. It allows immutable fields, makes dependencies explicit, and is easy to test.</div>`
      },
      {
        title:"Bean Scopes & Lifecycle",tag:"concept",
        body:`
<div class="topic-intro">
<p>Every object Spring manages is called a <b>Bean</b>. Spring controls its creation, initialization, and destruction.</p>
</div>
<div class="code-block">
  <div class="code-label">Bean Lifecycle — Simplified</div>
  <div class="code-body"><span class="nm">1</span>. Spring reads <span class="an">@Component</span>/<span class="an">@Service</span>/<span class="an">@Repository</span> etc.
<span class="nm">2</span>. Instantiates the bean (calls constructor)
<span class="nm">3</span>. Injects dependencies (<span class="an">@Autowired</span>)
<span class="nm">4</span>. Calls <span class="an">@PostConstruct</span> method
<span class="nm">5</span>. Bean is ready to use
<span class="nm">6</span>. On shutdown: calls <span class="an">@PreDestroy</span> method
<span class="nm">7</span>. Bean is destroyed</div>
</div>
<div class="code-block">
  <div class="code-label">PostConstruct & PreDestroy</div>
  <div class="code-body"><span class="an">@Service</span>
<span class="kw">public class</span> <span class="cl">CacheService</span> {

    <span class="an">@PostConstruct</span>
    <span class="kw">void</span> <span class="fn">loadCache</span>() {
        <span class="cm">// Runs after all dependencies injected</span>
        <span class="cm">// Good for: loading data, opening connections</span>
    }

    <span class="an">@PreDestroy</span>
    <span class="kw">void</span> <span class="fn">clearCache</span>() {
        <span class="cm">// Runs before Spring shuts down the bean</span>
        <span class="cm">// Good for: releasing resources, saving state</span>
    }
}</div>
</div>
<table class="cmp-table">
  <tr><th>Scope</th><th>What it means</th><th>Use case</th></tr>
  <tr><td>Singleton (default)</td><td>One instance per Spring container, shared everywhere</td><td>Services, repos — stateless beans</td></tr>
  <tr><td>Prototype</td><td>New instance every time you request the bean</td><td>Stateful helpers, builders</td></tr>
  <tr><td>Request</td><td>One per HTTP request</td><td>Web: request-scoped data</td></tr>
  <tr><td>Session</td><td>One per HTTP session</td><td>Web: user session data</td></tr>
</table>
<div class="callout callout-warn">⚠️ Never inject a Prototype bean into a Singleton. The Singleton will always get the same Prototype instance — defeating the purpose.</div>`
      },

        title:"Spring AOP — Cross-Cutting Concerns",tag:"concept",
        body:`
<div class="topic-intro">
<p>AOP (Aspect-Oriented Programming) lets you add behaviour (logging, security, transactions) to methods <b>without changing the method itself</b>. This avoids scattering logging code across hundreds of methods.</p>
<p><b>Key terms:</b></p>
<ul>
<li><b>Aspect</b> — the class containing the cross-cutting logic</li>
<li><b>Advice</b> — what to do (@Before, @After, @Around)</li>
<li><b>Pointcut</b> — which methods to target (expression)</li>
<li><b>Join point</b> — the actual method execution</li>
</ul>
</div>
<div class="code-block">
  <div class="code-label">EXAMPLE — Logging Aspect</div>
  <div class="code-body"><span class="an">@Aspect</span>
<span class="an">@Component</span>
<span class="kw">public class</span> <span class="cl">LoggingAspect</span> {

    <span class="cm">// Targets ALL methods in the service package</span>
    <span class="an">@Before</span>(<span class="st">"execution(* com.example.service.*.*(..))"</span>)
    <span class="kw">public void</span> <span class="fn">logBefore</span>(<span class="cl">JoinPoint</span> jp) {
        System.out.println(<span class="st">"Calling: "</span> + jp.getSignature().getName());
    }

    <span class="an">@Around</span>(<span class="st">"execution(* com.example.service.*.*(..))"</span>)
    <span class="kw">public</span> <span class="cl">Object</span> <span class="fn">timeMethod</span>(<span class="cl">ProceedingJoinPoint</span> pjp) <span class="kw">throws</span> <span class="cl">Throwable</span> {
        <span class="kw">long</span> start = System.currentTimeMillis();
        <span class="cl">Object</span> result = pjp.proceed(); <span class="cm">// call the actual method</span>
        <span class="kw">long</span> time = System.currentTimeMillis() - start;
        System.out.println(<span class="st">"Took: "</span> + time + <span class="st">"ms"</span>);
        <span class="kw">return</span> result;
    }
}</div>
</div>
<div class="callout callout-info">ℹ️ Spring AOP works via <b>proxies</b>. Spring wraps your bean in a proxy object. When you call a method, the proxy intercepts it, runs the advice, then calls the real method. This is why <code>@Transactional</code> on a private method or a self-call doesn't work — it bypasses the proxy.</div>`
      }
    ],
    qa:[
      {q:"What is Inversion of Control (IoC)?",d:"easy",a:`Framework controls object creation instead of your code. You don't new up dependencies — Spring creates and wires them. Dependency Injection is the mechanism that implements IoC.`},
      {q:"What are the types of Dependency Injection?",d:"medium",a:`Constructor (preferred: immutable, testable), Setter (optional dependencies), Field injection (@Autowired on field: easy to write, hard to test, avoid).<div class="tip">💡 If you have only one constructor, Spring 4.3+ doesn't even need @Autowired.</div>`},
      {q:"What is the lifecycle of a Spring Bean?",d:"medium",a:`Instantiate → Inject dependencies → @PostConstruct → Ready → @PreDestroy → Destroyed. PostConstruct is great for cache loading. PreDestroy for cleanup.`},
      {q:"What are Bean scopes in Spring?",d:"medium",a:`Singleton (default — one instance shared), Prototype (new per request), Request (one per HTTP request), Session (one per HTTP session).<div class="note">⚠️ Injecting Prototype into Singleton defeats prototyping — Singleton holds one Prototype forever.</div>`},
      {q:"What does @Qualifier do?",d:"easy",a:`When multiple beans of the same type exist, @Qualifier picks which one to inject. Alternative: mark one bean @Primary to make it the default choice.`},
      {q:"What is Spring AOP and what problem does it solve?",d:"hard",a:`Separates cross-cutting concerns (logging, transactions, security) from business logic. Write once as an Aspect, apply declaratively. Works via JDK dynamic proxies (for interfaces) or CGLIB (for classes). @Transactional and @Cacheable are built on AOP.`}
    ]

<span class="kw">class</span> <span class="cl">DataSourceAutoConfiguration</span> {

</div>

        body:`
<div class="topic-intro">
<p>REST (Representational State Transfer) is an architectural style for building APIs over HTTP. Understanding its constraints helps you design clean APIs.</p>
<p><b>6 REST Constraints:</b></p>
<ol>
<li><b>Client-Server</b> — UI and data are separated. They evolve independently.</li>
<li><b>Stateless</b> — Each request has ALL info needed. Server stores no session. This enables horizontal scaling.</li>
<li><b>Cacheable</b> — Responses declare if they're cacheable. GET requests should be cacheable.</li>
<li><b>Uniform Interface</b> — Standard methods (GET/POST/PUT/DELETE), resource URLs, consistent response format.</li>
<li><b>Layered System</b> — Client can't tell if it's hitting server directly or through a proxy/gateway.</li>
<li><b>Code on Demand</b> (optional) — Server can send executable code (e.g., JavaScript).</li>
</ol>
</div>
<table class="cmp-table">
  <tr><th>Method</th><th>Action</th><th>Idempotent?</th><th>Body?</th></tr>
  <tr><td>GET</td><td>Read resource</td><td>Yes</td><td>No</td></tr>
  <tr><td>POST</td><td>Create resource</td><td>No</td><td>Yes</td></tr>
  <tr><td>PUT</td><td>Replace entire resource</td><td>Yes</td><td>Yes</td></tr>
  <tr><td>PATCH</td><td>Partial update</td><td>Depends</td><td>Yes</td></tr>
  <tr><td>DELETE</td><td>Delete resource</td><td>Yes</td><td>No</td></tr>
</table>
<div class="callout callout-info">ℹ️ <b>Idempotent</b> means calling the same request multiple times gives the same result. PUT /users/1 with the same body 10 times = same outcome. POST /users 10 times = 10 users created.</div>`
      },

        title:"HTTP Status Codes You Must Know",tag:"concept",
        body:`
<div class="topic-intro">
<p>Returning the correct status code is part of building a good REST API. Interviewers will ask you to name codes for specific scenarios.</p>
</div>
<table class="cmp-table">
  <tr><th>Code</th><th>Name</th><th>When to use</th></tr>
  <tr><td>200</td><td>OK</td><td>Successful GET, PUT, PATCH</td></tr>
  <tr><td>201</td><td>Created</td><td>Successful POST — resource created</td></tr>
  <tr><td>204</td><td>No Content</td><td>Successful DELETE or action with no response body</td></tr>
  <tr><td>400</td><td>Bad Request</td><td>Validation failed, malformed request</td></tr>
  <tr><td>401</td><td>Unauthorized</td><td>Not authenticated — no token or invalid token</td></tr>
  <tr><td>403</td><td>Forbidden</td><td>Authenticated but no permission</td></tr>
  <tr><td>404</td><td>Not Found</td><td>Resource doesn't exist</td></tr>
  <tr><td>409</td><td>Conflict</td><td>Duplicate — email already exists</td></tr>
  <tr><td>422</td><td>Unprocessable Entity</td><td>Semantically invalid (valid JSON but business rule failed)</td></tr>
  <tr><td>500</td><td>Internal Server Error</td><td>Unexpected server error</td></tr>
  <tr><td>503</td><td>Service Unavailable</td><td>Server down / overloaded</td></tr>
</table>`

            .body(<span class="kw">new</span> <span class="cl">ErrorResponse</span>(<span class="st">"NOT_FOUND"</span>, ex.getMessage()));
    }

    <span class="an">@ExceptionHandler</span>(<span class="cl">MethodArgumentNotValidException</span>.<span class="kw">class</span>)
    <span class="kw">public</span> <span class="cl">ResponseEntity</span>&lt;<span class="cl">ErrorResponse</span>&gt; <span class="fn">handleValidation</span>(<span class="cl">MethodArgumentNotValidException</span> ex) {
        <span class="cl">String</span> msg = ex.getBindingResult().getFieldErrors().stream()
            .map(e -&gt; e.getField() + <span class="st">": "</span> + e.getDefaultMessage())

        <span class="kw">return</span> <span class="cl">ResponseEntity</span>.badRequest()
            .body(<span class="kw">new</span> <span class="cl">ErrorResponse</span>(<span class="st">"VALIDATION_ERROR"</span>, msg));
    }
}</div>
</div>`

        body:`
<div class="topic-intro">
<p>Directly returning your JPA entity from a REST endpoint seems easy but causes serious problems in production.</p>
</div>
<div class="concept-grid">
  <div class="concept-cell"><div class="concept-cell-label">🔒 Security</div><div class="concept-cell-val">Entities often have fields like password, salt, internalFlag that you'd never want in an API response</div></div>
  <div class="concept-cell"><div class="concept-cell-label">🔗 Coupling</div><div class="concept-cell-val">If you rename a DB column, your API contract breaks — clients need to update</div></div>
  <div class="concept-cell"><div class="concept-cell-label">💥 Serialization</div><div class="concept-cell-val">Lazy-loaded relations cause LazyInitializationException or infinite recursion in Jackson</div></div>
  <div class="concept-cell"><div class="concept-cell-label">📦 Flexibility</div><div class="concept-cell-val">API response can combine data from multiple entities, computed fields, aggregations</div></div>
</div>
<div class="code-block">
  <div class="code-label">Entity → DTO mapping</div>
  <div class="code-body"><span class="cm">// Entity — internal DB representation</span>
<span class="an">@Entity</span>
<span class="kw">public class</span> <span class="cl">User</span> {
    <span class="kw">private</span> <span class="cl">Long</span> id;
    <span class="kw">private</span> <span class="cl">String</span> name;
    <span class="kw">private</span> <span class="cl">String</span> email;
    <span class="kw">private</span> <span class="cl">String</span> passwordHash; <span class="cm">// NEVER expose this</span>
    <span class="kw">private</span> <span class="cl">String</span> internalRef;  <span class="cm">// NEVER expose this</span>
}

<span class="cm">// DTO — what the API returns</span>
<span class="kw">record</span> <span class="cl">UserDTO</span>(<span class="cl">Long</span> id, <span class="cl">String</span> name, <span class="cl">String</span> email) {
    <span class="kw">static</span> <span class="cl">UserDTO</span> <span class="fn">from</span>(<span class="cl">User</span> user) {
        <span class="kw">return new</span> <span class="cl">UserDTO</span>(user.getId(), user.getName(), user.getEmail());
    }
}</div>
</div>`

<div class="topic-intro">
<p>JPA maps Java classes to DB tables. You write objects — Hibernate writes SQL for you.</p>
</div>
<div class="code-block">
  <div class="code-label">Entity mapping</div>
  <div class="code-body"><span class="an">@Entity</span>
<span class="an">@Table</span>(name = <span class="st">"orders"</span>)
<span class="kw">public class</span> <span class="cl">Order</span> {

    <span class="an">@Id</span>
    <span class="an">@GeneratedValue</span>(strategy = GenerationType.IDENTITY)
    <span class="kw">private</span> <span class="cl">Long</span> id;

    <span class="an">@Column</span>(nullable = <span class="kw">false</span>)
    <span class="kw">private</span> <span class="cl">String</span> status;

    <span class="an">@ManyToOne</span>(fetch = FetchType.LAZY)
    <span class="an">@JoinColumn</span>(name = <span class="st">"user_id"</span>)     <span class="cm">// foreign key column in orders table</span>
    <span class="kw">private</span> <span class="cl">User</span> user;

    <span class="an">@OneToMany</span>(mappedBy = <span class="st">"order"</span>, cascade = CascadeType.ALL)
    <span class="kw">private</span> List&lt;<span class="cl">OrderItem</span>&gt; items = <span class="kw">new</span> ArrayList&lt;&gt;();
}</div>
</div>
<div class="callout callout-warn">⚠️ The <b>@ManyToOne side owns</b> the relationship (holds the foreign key). <code>mappedBy</code> on the @OneToMany side tells JPA "the other side owns this". Forget mappedBy → JPA creates an unwanted join table.</div>`

        title:"The N+1 Problem — Most Asked JPA Question",tag:"gotcha",
        body:`
<div class="topic-intro">
<p>This is the #1 JPA performance issue interviewers ask about. You must be able to explain it and fix it.</p>
<p><b>The problem:</b> Fetching N entities triggers N additional SQL queries for their relationships. 100 orders → 101 queries!</p>
</div>
<div class="code-block">
  <div class="code-label">N+1 — The Bug</div>
  <div class="code-body">List&lt;<span class="cl">Order</span>&gt; orders = orderRepo.findAll(); <span class="cm">// 1 query: SELECT * FROM orders</span>
<span class="kw">for</span> (<span class="cl">Order</span> o : orders) {
    o.getItems(); <span class="cm">// 1 query PER order: SELECT * FROM order_items WHERE order_id=?</span>
}
<span class="cm">// Result: 1 + N queries. For 100 orders = 101 queries. BAD.</span></div>
</div>
<div class="code-block">
  <div class="code-label">Fix 1 — JOIN FETCH in JPQL</div>
  <div class="code-body"><span class="an">@Query</span>(<span class="st">"SELECT o FROM Order o JOIN FETCH o.items"</span>)
List&lt;<span class="cl">Order</span>&gt; <span class="fn">findAllWithItems</span>();
<span class="cm">// Result: 1 query with JOIN. Items loaded eagerly for this specific call.</span></div>
</div>
<div class="code-block">
  <div class="code-label">Fix 2 — @EntityGraph</div>
  <div class="code-body"><span class="an">@EntityGraph</span>(attributePaths = {<span class="st">"items"</span>})
List&lt;<span class="cl">Order</span>&gt; <span class="fn">findAll</span>();
<span class="cm">// Declarative — tells JPA to eagerly load items for this query</span></div>
</div>
<div class="callout callout-tip">💡 Enable SQL logging in dev: <code>spring.jpa.show-sql=true</code>. If you see the same query repeated in a loop, you have N+1.</div>`
      },

        title:"@Transactional — Deep Dive",tag:"gotcha",
        body:`
<div class="code-block">
  <div class="code-label">Basic usage</div>
  <div class="code-body"><span class="an">@Service</span>
<span class="kw">public class</span> <span class="cl">OrderService</span> {

    <span class="an">@Transactional</span>  <span class="cm">// wraps everything in a DB transaction</span>
    <span class="kw">public void</span> <span class="fn">placeOrder</span>(<span class="cl">OrderRequest</span> req) {
        <span class="cl">Order</span> order = <span class="fn">createOrder</span>(req);      <span class="cm">// step 1</span>
        <span class="fn">reserveInventory</span>(req.getItems());  <span class="cm">// step 2</span>
        <span class="fn">chargePayment</span>(req.getPayment());   <span class="cm">// step 3</span>
        <span class="cm">// If ANY step fails → ALL rolled back automatically</span>
    }
}</div>
</div>
<div class="code-block">
  <div class="code-label">Propagation — what happens when transactional methods call each other</div>
  <div class="code-body">REQUIRED (default)    <span class="cm">// join existing tx, or create new one if none</span>
REQUIRES_NEW          <span class="cm">// always new tx, suspend existing one</span>
NESTED                <span class="cm">// savepoint inside existing tx</span>
NOT_SUPPORTED         <span class="cm">// suspend any existing tx, run without</span>

<span class="cm">// Example: audit log should commit even if main tx rolls back</span>
<span class="an">@Transactional</span>(propagation = Propagation.REQUIRES_NEW)
<span class="kw">public void</span> <span class="fn">saveAuditLog</span>(<span class="cl">AuditLog</span> log) { ... }</div>
</div>
<div class="callout callout-danger">🚫 <b>Common gotchas:</b><br>1. @Transactional only works on <b>public</b> methods<br>2. Calling a @Transactional method from within the same class bypasses the proxy — no transaction!<br>3. RuntimeException causes rollback by default. CheckedException does NOT. Use <code>rollbackFor=Exception.class</code> if needed.</div>`
      }
    ],
    qa:[
      {q:"What is ORM and what problem does JPA solve?",d:"easy",a:`ORM bridges Java objects and DB tables. Without it you'd write raw SQL + manual mapping. JPA is the spec; Hibernate is the implementation. Write Java objects — Hibernate generates SQL.`},
      {q:"Explain @OneToMany and @ManyToOne. Which side owns the relationship?",d:"medium",a:`@ManyToOne side owns (holds foreign key). @OneToMany side uses mappedBy to point to the owning side. Forget mappedBy → JPA creates an unwanted join table instead of a foreign key.<div class="note">⚠️ Always initialize collections: private List items = new ArrayList<>();</div>`},
      {q:"What is the N+1 problem? How do you fix it?",d:"hard",a:`Fetching N entities triggers N extra queries for their relations. Fix: JOIN FETCH in @Query, @EntityGraph, or @BatchSize. Detect with spring.jpa.show-sql=true — repeated queries in a loop = N+1.`},
      {q:"What is the difference between LAZY and EAGER fetching?",d:"medium",a:`LAZY (default for collections): load on access. Efficient but causes LazyInitializationException outside transaction. EAGER (default for @ManyToOne): load immediately. Avoid setting everything EAGER — causes over-fetching. Use LAZY + JOIN FETCH when needed.`},
      {q:"What does @Transactional do? What is propagation?",d:"hard",a:`Wraps method in DB transaction — all succeeds or all rolls back. Propagation: REQUIRED (join or create), REQUIRES_NEW (always new), NESTED (savepoint). Gotchas: only public methods, self-calls bypass proxy, RuntimeException rolls back by default.`},
      {q:"What is the difference between JpaRepository and CrudRepository?",d:"easy",a:`CrudRepository: basic CRUD. PagingAndSortingRepository: adds pagination. JpaRepository: extends both + JPA-specific (flush, saveAndFlush, findAll(Pageable)). Use JpaRepository unless you have a specific reason not to.`}

  <div class="code-body">users:  id=1 Alice, id=2 Bob, id=3 Charlie
orders: id=A user_id=1, id=B user_id=1, id=C user_id=99 (no matching user!)</div>

      {
        title:"Indexes — Why Queries Are Slow Without Them",tag:"concept",
        body:`
<div class="topic-intro">
<p>An index is a sorted data structure (usually B-tree) that the DB maintains alongside a table. Think of it as a book's index — instead of reading every page (full table scan), you jump straight to the right page.</p>
</div>
<div class="code-block">
  <div class="code-label">Index example</div>
  <div class="code-body"><span class="cm">-- Without index: DB reads every row (full table scan)</span>
SELECT * FROM users WHERE email = 'alice@example.com';
<span class="cm">-- 1 million rows → checks all 1M. O(n)</span>

<span class="cm">-- Add index</span>
CREATE INDEX idx_users_email ON users(email);

<span class="cm">-- Now: DB uses B-tree to find email directly. O(log n)</span>
<span class="cm">-- 1 million rows → ~20 comparisons</span></div>
</div>
<table class="cmp-table">
  <tr><th>Index type</th><th>When to use</th></tr>
  <tr><td>Single column</td><td>Queries filtering by one column (WHERE email = ?)</td></tr>
  <tr><td>Composite</td><td>Queries filtering by multiple columns (WHERE user_id=? AND status=?)</td></tr>
  <tr><td>Unique index</td><td>Enforce uniqueness + speed (email, username)</td></tr>
  <tr><td>Partial index</td><td>Index only a subset (WHERE status = 'ACTIVE')</td></tr>
</table>
<div class="callout callout-warn">⚠️ Every index slows down INSERT/UPDATE/DELETE (DB must maintain the index). Don't index every column. Index columns used in WHERE, JOIN ON, ORDER BY.</div>`
      },
      {
        title:"ACID Properties",tag:"concept",
        body:`
<div class="topic-intro">
<p>ACID is what makes relational databases reliable for financial and critical data.</p>
</div>
<div class="concept-grid">
  <div class="concept-cell"><div class="concept-cell-label">Atomicity</div><div class="concept-cell-val">All operations succeed, or ALL are rolled back. No partial updates. Transfer $100: debit + credit both succeed or neither does.</div></div>
  <div class="concept-cell"><div class="concept-cell-label">Consistency</div><div class="concept-cell-val">DB always moves from one valid state to another. Constraints (NOT NULL, FK, CHECK) are never violated.</div></div>
  <div class="concept-cell"><div class="concept-cell-label">Isolation</div><div class="concept-cell-val">Concurrent transactions don't see each other's intermediate state. Levels: READ UNCOMMITTED → READ COMMITTED → REPEATABLE READ → SERIALIZABLE</div></div>
  <div class="concept-cell"><div class="concept-cell-label">Durability</div><div class="concept-cell-val">Once committed, data survives crashes. Written to disk (WAL log). Power off → data still there when DB restarts.</div></div>
</div>`
      }

      {q:"What is the difference between INNER JOIN, LEFT JOIN, and RIGHT JOIN?",d:"medium",a:`INNER: only rows matching in both tables. LEFT: all left rows + matching right (null if no match). RIGHT: all right rows + matching left. Most common: INNER (matching data) and LEFT (all from one side, optional relation).`},
      {q:"What is an index? Why does it speed up queries?",d:"medium",a:`B-tree structure for fast lookup. Without index: full table scan O(n). With index: B-tree lookup O(log n). Speeds up reads but slows writes (index must be maintained). Index columns used in WHERE, JOIN, ORDER BY.`},
      {q:"What is GROUP BY and when would you use HAVING?",d:"medium",a:`GROUP BY aggregates rows with same column value. HAVING filters on aggregated results (WHERE can't filter aggregates). WHERE filters rows before grouping. HAVING filters groups after aggregation.`},
      {q:"What are ACID properties?",d:"medium",a:`Atomicity (all or nothing), Consistency (valid state always), Isolation (concurrent tx don't interfere), Durability (committed data survives crashes). What makes RDBMS reliable for financial data.`},
      {q:"What is a query execution plan and why does it matter?",d:"hard",a:`Shows how the DB processes a query — indexes used, join strategy, row estimates. EXPLAIN ANALYZE in PostgreSQL. Look for Seq Scan (bad on large tables) vs Index Scan (good). Run before adding an index blindly.`},
      {q:"What is a Primary Key vs Foreign Key vs Unique constraint?",d:"easy",a:`PK: uniquely identifies row, not null, one per table. FK: references PK in another table, enforces referential integrity. Unique: like PK but allows nulls, table can have multiple unique constraints.`}

<div class="topic-intro">
<p>Understanding the real tradeoffs — not just the buzzwords — is what separates senior devs in interviews.</p>
</div>
<table class="cmp-table">
  <tr><th>Aspect</th><th>Monolith</th><th>Microservices</th></tr>
  <tr><td>Deployment</td><td>One unit — simple, fast initially</td><td>Many services — complex CI/CD</td></tr>
  <tr><td>Scaling</td><td>Scale the whole app</td><td>Scale each service independently</td></tr>
  <tr><td>Team</td><td>One team, one codebase</td><td>Each team owns their service</td></tr>
  <tr><td>Data</td><td>One shared DB</td><td>Each service has its own DB</td></tr>
  <tr><td>Failures</td><td>One service down = full outage</td><td>One service down = partial degradation</td></tr>
  <tr><td>Testing</td><td>Easy integration tests</td><td>Complex distributed testing</td></tr>
  <tr><td>Latency</td><td>In-process calls (fast)</td><td>Network calls (slower, can fail)</td></tr>
</table>
<div class="callout callout-tip">💡 Don't start with microservices. Start monolith → hit real scaling/team pain → extract services. Amazon, Netflix started as monoliths.</div>`

        title:"Service Communication — Sync vs Async",tag:"concept",
        body:`
<div class="code-block">
  <div class="code-label">Synchronous — REST (caller waits)</div>
  <div class="code-body">OrderService  ──── REST call ───→  PaymentService
              ←─── response ────

✅ Simple, easy to debug
✅ Immediate consistency
❌ If PaymentService is down → OrderService request fails
❌ Tight temporal coupling</div>
</div>
<div class="code-block">
  <div class="code-label">Asynchronous — Message Queue (fire and forget)</div>
  <div class="code-body">OrderService ──── message ───→  Queue (RabbitMQ/SQS)
                                       └───→  PaymentService (processes when ready)

✅ OrderService doesn't wait — highly available
✅ Services are decoupled — PaymentService can be down momentarily
❌ Harder to trace, debug
❌ Eventual consistency (not immediate)</div>
</div>
<div class="callout callout-info">ℹ️ Use <b>sync (REST)</b> for user-facing real-time flows (checkout, login). Use <b>async (queues)</b> for background tasks, notifications, batch processing.</div>`
      },
      {
        title:"Circuit Breaker Pattern",tag:"pattern",
        body:`
<div class="topic-intro">
<p>Without a circuit breaker: Service A calls slow/down Service B → A's threads pile up waiting → A runs out of threads → A crashes. Cascading failure.</p>
<p>The circuit breaker stops this by <b>failing fast</b> when a downstream service is unhealthy.</p>
</div>
<div class="code-block">
  <div class="code-label">Circuit Breaker States</div>
  <div class="code-body">CLOSED   → Normal. Requests flow through. Failure rate monitored.
           If failure rate > threshold (e.g., 50%) → switch to OPEN

OPEN     → Requests immediately rejected (fail fast). No calls to downstream.
           After timeout (e.g., 30s) → switch to HALF-OPEN

HALF-OPEN → Let one test request through.
            If success → switch to CLOSED (service recovered)
            If failure → switch back to OPEN</div>
</div>
<div class="code-block">
  <div class="code-label">Resilience4j — Spring Boot</div>
  <div class="code-body"><span class="an">@CircuitBreaker</span>(name = <span class="st">"paymentService"</span>, fallbackMethod = <span class="st">"paymentFallback"</span>)
<span class="kw">public</span> <span class="cl">PaymentResult</span> <span class="fn">processPayment</span>(<span class="cl">PaymentRequest</span> req) {
    <span class="kw">return</span> paymentClient.process(req);
}

<span class="kw">public</span> <span class="cl">PaymentResult</span> <span class="fn">paymentFallback</span>(<span class="cl">PaymentRequest</span> req, <span class="cl">Throwable</span> t) {
    <span class="cm">// Called when circuit is OPEN — return cached or default response</span>
    <span class="kw">return</span> <span class="cl">PaymentResult</span>.pending();
}</div>
</div>`
      }
    ],
    qa:[
      {q:"Monolith vs Microservices — what are the real tradeoffs?",d:"medium",a:`Monolith: simple, fast to start, one deployment, hard to scale parts independently. Microservices: independent scaling/deployment, team autonomy, but network complexity, distributed data, harder testing/debugging. Don't start with microservices.`},
      {q:"What is an API Gateway and what does it do?",d:"medium",a:`Single entry point. Handles routing, auth (JWT validation), rate limiting, SSL termination, load balancing, request aggregation. Spring Cloud Gateway is the Spring choice.`},
      {q:"What is a Circuit Breaker pattern? Why is it needed?",d:"hard",a:`Prevents cascading failures. Without it: slow service B causes service A threads to pile up → A crashes. States: Closed (normal), Open (fail fast after threshold), Half-Open (test recovery). Resilience4j in Spring Boot.`},
      {q:"How do microservices communicate — sync vs async?",d:"medium",a:`Sync (REST/gRPC): caller waits. Simple but tight coupling — if downstream is down, caller fails. Async (queues): fire and forget. Decoupled, resilient, but eventual consistency. Use sync for real-time user flows, async for background tasks.`},
      {q:"What is Service Discovery? How does Eureka work?",d:"medium",a:`Dynamic IP lookup — services register themselves, clients query registry. Eureka: services heartbeat every 30s. Miss heartbeats → removed from registry. Clients get current address from Eureka, not hardcoded IPs.`},
      {q:"What is the Saga pattern?",d:"hard",a:`Manages distributed transactions. Choreography: services emit events, react to others (decentralized). Orchestration: central coordinator tells each service what to do, handles compensation on failure. Example: order → reserve inventory → charge → if charge fails → undo reservation.`}
    ]

        title:"JWT Authentication — End to End",tag:"concept",
        body:`
<div class="topic-intro">
<p>JWT (JSON Web Token) enables <b>stateless authentication</b> — no session stored on server. Each request carries its own proof of identity.</p>
</div>
<div class="code-block">
  <div class="code-label">JWT Structure — 3 parts separated by dots</div>
  <div class="code-body">eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyMSIsInJvbGVzIjpbIlVTRVIiXSwiZXhwIjoxNzE5MDAwMDAwfQ.abc123

HEADER (base64)   → { "alg": "HS256", "typ": "JWT" }
PAYLOAD (base64)  → { "sub": "user1", "roles": ["USER"], "exp": 1719000000 }
SIGNATURE         → HMAC( header + "." + payload, secretKey )

The server validates signature to confirm token wasn't tampered with.
No DB lookup needed — the token IS the identity.</div>
</div>
<div class="code-block">
  <div class="code-label">JWT Auth Flow</div>
  <div class="code-body"><span class="nm">1</span>. Client: POST /auth/login { username, password }
<span class="nm">2</span>. Server: validates credentials → generates JWT (exp: 15 min)
<span class="nm">3</span>. Client: stores token, sends with every request:
         Authorization: Bearer eyJhbGci...
<span class="nm">4</span>. Server filter: extracts token → validates signature → sets SecurityContext
<span class="nm">5</span>. Controller: @PreAuthorize("hasRole('ADMIN')") → checks SecurityContext</div>
</div>
<div class="callout callout-warn">⚠️ JWT payload is BASE64 encoded, NOT encrypted. Anyone can decode and read it. Never put passwords, credit card numbers, or sensitive PII in JWT payload.</div>`
      },
      {
        title:"Spring Security Filter Chain",tag:"concept",
        body:`
<div class="topic-intro">
<p>Every HTTP request passes through a chain of security filters before reaching your controller. Each filter has a specific job.</p>
</div>
<div class="code-block">
  <div class="code-label">Filter chain order</div>
  <div class="code-body">HTTP Request
    │
    ▼
SecurityContextPersistenceFilter    → loads security context from session (or empty)
    │
    ▼
YOUR JwtAuthenticationFilter        → extract token → validate → set SecurityContext
    │
    ▼
UsernamePasswordAuthenticationFilter → handles /login form (if applicable)
    │
    ▼
ExceptionTranslationFilter          → catches auth exceptions → 401/403 response
    │
    ▼
FilterSecurityInterceptor           → checks @PreAuthorize / SecurityConfig rules
    │
    ▼
Your Controller Method</div>
</div>
<div class="code-block">
  <div class="code-label">Security config — Spring Boot 3</div>
  <div class="code-body"><span class="an">@Configuration</span>
<span class="kw">public class</span> <span class="cl">SecurityConfig</span> {

    <span class="an">@Bean</span>
    <span class="kw">public</span> <span class="cl">SecurityFilterChain</span> <span class="fn">filterChain</span>(<span class="cl">HttpSecurity</span> http) <span class="kw">throws</span> <span class="cl">Exception</span> {
        <span class="kw">return</span> http
            .csrf(csrf -&gt; csrf.disable())       <span class="cm">// stateless API — no CSRF needed</span>
            .sessionManagement(s -&gt; s.sessionCreationPolicy(STATELESS))
            .authorizeHttpRequests(auth -&gt; auth
                .requestMatchers(<span class="st">"/auth/**"</span>).permitAll()    <span class="cm">// public endpoints</span>
                .requestMatchers(<span class="st">"/admin/**"</span>).hasRole(<span class="st">"ADMIN"</span>)
                .anyRequest().authenticated()
            )
            .addFilterBefore(jwtFilter, <span class="cl">UsernamePasswordAuthenticationFilter</span>.<span class="kw">class</span>)
            .build();
    }
}</div>
</div>`
      },
      {
        title:"Redis Caching — Cache-Aside Pattern",tag:"code",
        body:`
<div class="code-block">
  <div class="code-label">Cache-Aside — how it works</div>
  <div class="code-body"><span class="nm">1</span>. App checks Redis for data (cache lookup)
<span class="nm">2</span>. Cache HIT  → return data directly (fast, no DB hit)
<span class="nm">3</span>. Cache MISS → fetch from DB → store in Redis with TTL → return data

<span class="cm">// Spring makes this trivial with @Cacheable</span></div>
</div>
<div class="code-block">
  <div class="code-label">Spring Cache annotations</div>
  <div class="code-body"><span class="an">@Service</span>
<span class="kw">public class</span> <span class="cl">ProductService</span> {

    <span class="an">@Cacheable</span>(value = <span class="st">"products"</span>, key = <span class="st">"#id"</span>)
    <span class="kw">public</span> <span class="cl">Product</span> <span class="fn">getProduct</span>(<span class="cl">Long</span> id) {
        <span class="cm">// Only runs on cache MISS. On HIT, cached value returned.</span>
        <span class="kw">return</span> productRepo.findById(id).orElseThrow();
    }

    <span class="an">@CacheEvict</span>(value = <span class="st">"products"</span>, key = <span class="st">"#id"</span>)
    <span class="kw">public</span> <span class="cl">Product</span> <span class="fn">updateProduct</span>(<span class="cl">Long</span> id, <span class="cl">ProductRequest</span> req) {
        <span class="cm">// Removes cached entry when product is updated</span>
        <span class="kw">return</span> productRepo.save(req.toEntity());
    }

    <span class="an">@CachePut</span>(value = <span class="st">"products"</span>, key = <span class="st">"#result.id"</span>)
    <span class="kw">public</span> <span class="cl">Product</span> <span class="fn">createProduct</span>(<span class="cl">ProductRequest</span> req) {
        <span class="cm">// Always runs AND updates cache</span>
        <span class="kw">return</span> productRepo.save(req.toEntity());
    }
}</div>
</div>
<div class="callout callout-tip">💡 Always set a TTL (time-to-live) on cached data. Stale data is a cache's worst enemy. For product catalog: TTL=1h. For user sessions: TTL=15m.</div>`
      }
    ],
    qa:[
      {q:"What is the difference between Authentication and Authorization?",d:"easy",a:`Authentication: who are you? (verify identity — login). Authorization: what can you do? (check permissions after identity verified). Authenticated but not authorized → 403 Forbidden.`},
      {q:"How does JWT work? What are its 3 parts?",d:"medium",a:`Header (algorithm), Payload (claims: userId, roles, exp), Signature (HMAC of header+payload with secret). Server validates signature — no DB lookup needed. Stateless. Payload is base64 NOT encrypted — never put sensitive data in it.`},
      {q:"What is the Spring Security filter chain?",d:"hard",a:`Every request passes through filters before reaching controller: load context → your JWT filter (validate token, set SecurityContext) → exception handler (401/403) → authorization check (@PreAuthorize). Add custom filters with addFilterBefore().`},
      {q:"What is the cache-aside pattern in Redis?",d:"medium",a:`1. Check cache. 2. HIT → return. 3. MISS → fetch DB → store in Redis with TTL → return. Spring: @Cacheable on method. @CacheEvict on update/delete. Always set TTL to prevent stale data.`},
      {q:"What is HikariCP and why does connection pool size matter?",d:"medium",a:`Default Spring Boot connection pool. Maintains pre-opened DB connections. Too small → threads wait for connections. Too large → DB overloaded. Rule of thumb: 2×CPU cores + effective spindle count. Default is 10.`}
    ]
