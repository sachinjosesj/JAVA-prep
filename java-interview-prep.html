        title:"How to Approach a System Design Question",tag:"pattern",
        body:`
<div class="topic-intro">
<p>System design interviews test your ability to think through building large-scale systems. They're open-ended — there's no single right answer. The goal is to show structured thinking.</p>
<p><b>Framework — use this every time:</b></p>
<ol>
<li><b>Clarify (5 min)</b> — Ask about scale, users, read/write ratio, latency requirements, must-haves vs nice-to-haves</li>
<li><b>Estimate scale (2 min)</b> — DAU, QPS, storage. This drives your architecture decisions.</li>
<li><b>Define the API (3 min)</b> — What endpoints do we need? This anchors the design.</li>
<li><b>Data model (5 min)</b> — What entities? What DB (SQL vs NoSQL)?</li>
<li><b>High-level architecture (10 min)</b> — Draw boxes: client, API gateway, services, DB, cache, queue</li>
<li><b>Deep dive (10 min)</b> — Bottlenecks, scaling strategies, trade-offs</li>
</ol>
</div>
<div class="callout callout-tip">💡 <b>Talk out loud at every step.</b> Interviewers want to see your reasoning. "I'm choosing PostgreSQL here because the data is relational and we need ACID transactions" is better than just writing "PostgreSQL".</div>`
      },

        title:"URL Shortener — Full Design Walkthrough",tag:"pattern",
        body:`
<div class="code-block">
  <div class="code-label">Step 1 — Clarify & Estimate</div>
  <div class="code-body">Scale: 100M URLs created/day, 10B redirects/day
Read:write ratio = 100:1 (very read-heavy)
Latency: redirect must be < 100ms
Storage: 100M × 500 bytes avg = ~50GB/day</div>
</div>
<div class="code-block">
  <div class="code-label">Step 2 — API</div>
  <div class="code-body">POST /shorten  { originalUrl, expiresAt? }  → { shortCode, shortUrl }
GET  /{code}                                 → 301 Redirect to originalUrl</div>
</div>
<div class="code-block">
  <div class="code-label">Step 3 — Data Model</div>
  <div class="code-body">urls table:
  id          BIGINT PRIMARY KEY
  short_code  VARCHAR(8)  INDEXED UNIQUE   ← lookup key
  original_url TEXT       NOT NULL
  created_at  TIMESTAMP
  expires_at  TIMESTAMP</div>
</div>
<div class="code-block">
  <div class="code-label">Step 4 — Short Code Generation</div>
  <div class="code-body">Base62 encode a counter: chars = [a-z, A-Z, 0-9] = 62 chars
6 chars = 62^6 = 56 billion unique codes

Alternative: MD5(originalUrl) → take first 6 chars
Risk: collisions → retry with different chars</div>
</div>
<div class="code-block">
  <div class="code-label">Step 5 — Architecture</div>
  <div class="code-body">Client → CDN (cache hot redirects) → API Gateway → App Server
                                                          │
                                              ┌───────────┴──────────┐
                                           Redis                PostgreSQL
                                      (hot short codes)       (all codes + metadata)

Redirect flow:
1. Check Redis for short_code (cache hit → 80% of traffic)
2. Miss → query PostgreSQL → store in Redis → redirect</div>
</div>`

  <tr><td>User profiles, product catalogs</td><td>MongoDB (NoSQL)</td><td>Flexible schema, document structure</td></tr>

</table>
<div class="callout callout-info">ℹ️ Most production systems use multiple: PostgreSQL for core business data, Redis for caching, maybe Elasticsearch for search. This is called <b>polyglot persistence</b>.</div>`

      {q:"What is the difference between vertical and horizontal scaling?",d:"easy",a:`Vertical (scale up): more CPU/RAM on one machine. Simple but limited and expensive. Horizontal (scale out): more instances behind a load balancer. Unlimited scale but requires stateless services.`},

<div class="topic-intro">
<p>Technical knowledge is only 60% of the interview. The other 40% is how you communicate that knowledge.</p>
<p><b>Before you answer any question:</b></p>
<ol>
<li>Pause 2–3 seconds. Collect your thoughts.</li>
<li>Restate the question briefly to confirm understanding.</li>
<li>Start with the simple case, then add depth.</li>
<li>Use examples — abstract theory without examples sounds memorized.</li>
<li>Acknowledge trade-offs — "This approach is better for X but worse for Y".</li>
</ol>
<p><b>If you don't know the answer:</b></p>
<ul>
<li>"I haven't worked with this directly, but based on what I know about X, I'd expect Y"</li>

<li>Never bluff — experienced interviewers will probe deeper and expose it</li>
</ul>

      {q:"How would you debug a Spring Boot app that's running slow?",d:"hard",a:`Check Actuator /metrics for response times. Enable SQL logging — N+1 problem? Check thread pool exhaustion (threads blocked waiting for DB). Check cache hit rates. EXPLAIN ANALYZE on slow queries. JVM profiler for hot methods. GC logs for excessive pauses.`},

  { icon:"🗃️", name:"DBeaver", cat:"practice", catLabel:"Practice",
    desc:"Free universal DB client — PostgreSQL, MySQL, H2, Oracle.",
    why:"Write and run SQL queries against a real DB. Practice EXPLAIN ANALYZE on queries. Visualize table relationships.",

    desc:"The best Spring/Java tutorial site on the internet.",
    why:"Deep, accurate, code-first articles. Every Spring Boot topic has a Baeldung article. Use as reference when studying any day's topic.",
    link:"https://www.baeldung.com" },
  { icon:"🔴", name:"Redis Insight", cat:"practice", catLabel:"Practice",
    desc:"Visual Redis client to see what's in your cache.",
    why:"Run Redis in Docker, use this to inspect cached keys, see TTL values, debug cache issues. Makes Redis tangible.",

    why:"Practice drawing system architecture diagrams. In interviews you'll sketch these on a whiteboard — practicing in draw.io builds the habit of thinking visually.",
    link:"https://app.diagrams.net" },
  { icon:"🧪", name:"JUnit 5 + Mockito", cat:"setup", catLabel:"Setup",
    desc:"Java testing frameworks included with Spring Boot starter-test.",
    why:"Write a few unit tests for your practice code. Interviewers often ask about testing strategy and you'll be asked to write a test live.",
    link:"https://junit.org/junit5/" },
  { icon:"📖", name:"Spring Docs", cat:"learn", catLabel:"Learn",
    desc:"Official Spring Framework & Spring Boot documentation.",
    why:"Ground truth. When in doubt, go here. The Spring Boot reference guide is surprisingly readable. Bookmark it.",
    link:"https://docs.spring.io/spring-boot/docs/current/reference/html/" },
  { icon:"🧠", name:"Anki Flashcards", cat:"practice", catLabel:"Practice",
    desc:"Spaced-repetition flashcard app — free.",
    why:"Create cards for concepts you keep forgetting. Review 10 min/day. Spaced repetition is scientifically the most efficient memorization technique.",
    link:"https://apps.ankiweb.net" },
];

let currentDay = 0;
let activeTab = 'learn';

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-label">14-Day Plan</div>';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === currentDay ? ' active' : '');
    btn.innerHTML = `<span class="day-num">D${d.day}</span><span class="day-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.title}</span>`;
    btn.onclick = () => { currentDay = i; activeTab = 'learn'; renderSidebar(); renderMain(); };
    sb.appendChild(btn);
  });
}

function renderLearnTab(d) {
  return d.topics.map((t, ti) => `
    <div class="topic-card" id="topic-${ti}">
      <div class="topic-header" onclick="toggleTopic(${ti})">
        <span class="topic-num">${ti+1}</span>
        <span class="topic-title">${t.title}</span>
        <span class="topic-tag tag-${t.tag}">${t.tag}</span>
        <span class="topic-chevron">▶</span>
      </div>
      <div class="topic-body">${t.body}</div>
    </div>
  `).join('');
}

function renderQATab(d) {
  const qaCards = d.qa.map((item, qi) => `
    <div class="qa-card" id="qa-${qi}">
      <div class="qa-question" onclick="toggleQA(${qi})">
        <span class="q-number">Q${qi+1}</span>
        <span class="q-text">${item.q}</span>
        <span class="difficulty ${item.d}">${item.d}</span>
        <span class="q-chevron">▶</span>
      </div>
      <div class="qa-answer">${item.a}</div>
    </div>
  `).join('');

  return `
    <div class="qa-list">${qaCards}</div>
    <hr class="divider">
    <div class="ai-section">
      <div class="ai-header">
        <div class="ai-dot"></div>
        <div class="ai-label">AI Evaluator</div>
        <div class="ai-sublabel">Type your answer — get scored</div>
      </div>
      <div class="ai-body">
        <select class="ai-select-q" id="ai-q-select">
          ${d.qa.map((item, qi) => `<option value="${qi}">Q${qi+1}: ${item.q.substring(0,65)}...</option>`).join('')}
        </select>
        <textarea class="ai-textarea" id="ai-answer" placeholder="Type your answer in your own words..."></textarea>
        <button class="ai-btn" id="ai-eval-btn" onclick="evaluateAnswer()">Evaluate My Answer</button>
        <div class="ai-response" id="ai-response"></div>
      </div>
    </div>
  `;
}

function renderScheduleTab(d) {
  const isWeek1 = d.day <= 7;
  const rows = isWeek1 ? [
    ['Study topic content (this Learn tab)', '1.5 hrs'],
    ['Q&A tab — attempt before revealing', '45 min'],
    ['AI Evaluator — 3–4 questions out loud', '30 min'],
    ['Notes on weak points', '15 min'],
  ] : [
    ["Study today's topic", '1 hr'],
    ['Q&A + AI Evaluator', '45 min'],
    ['LeetCode / SQL practice (Days 8–9)', '45 min'],
    ['System design sketching', '30 min'],
  ];
  return `
    <div class="schedule-section">
      <div class="schedule-card">
        <div class="schedule-card-header">
          <div class="schedule-card-title">Day ${d.day} · ${isWeek1 ? 'Week 1 Learning' : 'Week 2 Practice'} Schedule</div>
          <span class="schedule-badge ${isWeek1?'badge-week1':'badge-week2'}">${isWeek1?'Week 1':'Week 2'}</span>
        </div>
        <table class="schedule-table">
          ${rows.map(([a,t]) => `<tr><td>${a}</td><td>${t}</td></tr>`).join('')}
          <tr class="total-row"><td>Total</td><td>~3 hours/day</td></tr>
        </table>
      </div>
      <div class="schedule-card">
        <div class="schedule-card-header"><div class="schedule-card-title">Weekday vs Weekend</div></div>
        <div class="split-grid">
          <div class="split-card">
            <div class="split-label">Weekdays · Mon–Fri</div>
            <div class="split-hours">1.5–2 hrs</div>
            <div class="split-desc">45 min morning before work + 1 hr evening</div>
          </div>
          <div class="split-card">
            <div class="split-label">Weekends · Sat–Sun</div>
            <div class="split-hours">3–4 hrs</div>
            <div class="split-desc">Heavy learning days — Days 1,2,8,9 are weekends intentionally</div>
          </div>
        </div>
      </div>
      <div class="schedule-card">
        <div class="schedule-card-header">
          <div class="schedule-card-title">Must-Follow Rules</div>
          <span class="schedule-badge badge-rule">Important</span>
        </div>
        <div class="rule-box">
          ${[
            ['🗣️','Answer out loud, not in your head','Speaking exposes gaps reading never does. Use AI Evaluator every day.'],
            ['🧠','Reveal AFTER you attempt, not before','Think 30 sec → say answer → reveal. Active recall is 3× more effective.'],
            ['📖','Explain WHY not just WHAT','With 7 YOE, they probe depth. Always have the reason ready.'],
            ['🔁','Review yesterday\'s weak answers first','10 min at start of each session revisiting previous struggles.'],
            ['⏱️','30 min active recall > 2 hrs passive reading','Short on time? Skip reading. Do Q&A only.'],
          ].map(([icon,title,sub]) => `
            <div class="rule-item">
              <div class="rule-icon">${icon}</div>
              <div class="rule-text"><strong>${title}</strong><br><span>${sub}</span></div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderToolsTab() {
  const cats = ['setup','practice','learn','ref'];
  const catNames = {setup:'🛠 Setup First',practice:'🎯 Practice Tools',learn:'📚 Learning Resources',ref:'📋 Reference'};
  const catColors = {setup:'cat-setup',practice:'cat-practice',learn:'cat-learn',ref:'cat-ref'};
  return `
    <div class="tools-section">
      ${cats.map(cat => {
        const tools = TOOLS.filter(t => t.cat === cat);
        if (!tools.length) return '';
        return `
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">${catNames[cat]}</div>
            <div class="tools-grid">
              ${tools.map(t => `
                <div class="tool-card">
                  <div class="tool-header">
                    <div class="tool-icon">${t.icon}</div>
                    <div class="tool-name">${t.name}</div>
                    <span class="tool-cat ${catColors[cat]}">${t.catLabel}</span>
                  </div>
                  <div class="tool-desc">${t.desc}</div>
                  <div class="tool-why">💡 ${t.why}</div>
                  <a class="tool-link" href="${t.link}" target="_blank">Open ↗</a>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderMain() {
  const d = DAYS[currentDay];
  const tabs = [
    {id:'learn',label:'📖 Learn'},
    {id:'qa',label:'❓ Q&A'},
    {id:'schedule',label:'⏱ Schedule'},
    {id:'tools',label:'🛠 Tools'},
  ];
  const tabBar = tabs.map(t =>
    `<button class="tab-btn${activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');

  let tabContent = '';
  if (activeTab === 'learn') tabContent = renderLearnTab(d);
  else if (activeTab === 'qa') tabContent = renderQATab(d);
  else if (activeTab === 'schedule') tabContent = renderScheduleTab(d);
  else if (activeTab === 'tools') tabContent = renderToolsTab();

  document.getElementById('main').innerHTML = `
    <div>
      <div class="day-tag">Day ${d.day} · ${d.date}</div>
      <div class="day-title">${d.title}</div>
      <div class="day-desc">${d.desc}</div>
      <div class="stats-row">
        <span class="stat-chip">${d.topics.length} topics</span>
        <span class="stat-chip">${d.qa.length} questions</span>
        <span class="stat-chip easy">Easy: ${d.qa.filter(q=>q.d==='easy').length}</span>
        <span class="stat-chip medium">Med: ${d.qa.filter(q=>q.d==='medium').length}</span>
        <span class="stat-chip hard">Hard: ${d.qa.filter(q=>q.d==='hard').length}</span>
      </div>
    </div>
    <div class="tab-bar">${tabBar}</div>
    <div class="tab-content">${tabContent}</div>
  `;
}

function switchTab(tab) {
  activeTab = tab;
  renderMain();
}

function toggleTopic(ti) {
  document.getElementById(`topic-${ti}`).classList.toggle('open');
}

function toggleQA(qi) {
  document.getElementById(`qa-${qi}`).classList.toggle('open');
}

async function evaluateAnswer() {
  const d = DAYS[currentDay];
  const qIndex = parseInt(document.getElementById('ai-q-select').value);
  const userAnswer = document.getElementById('ai-answer').value.trim();
  const btn = document.getElementById('ai-eval-btn');
  const responseDiv = document.getElementById('ai-response');
  if (!userAnswer) { alert('Please type your answer first.'); return; }
  btn.disabled = true; btn.textContent = 'Evaluating...';
  responseDiv.style.display = 'block'; responseDiv.textContent = 'Thinking...';
  const question = d.qa[qIndex].q;
  const ref = d.qa[qIndex].a.replace(/<[^>]+>/g, '');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content:
`You are a senior Java/Spring Boot interview coach. Candidate has 7 YOE.

Question: ${question}
Reference concepts: ${ref}
Candidate's answer: ${userAnswer}

Evaluate in this exact format:
Score: X/10

Strengths:
- [what they got right]

Gaps / Missing:
- [what was missing or wrong — be specific]

One tip:
[Single most important improvement]

Be direct. Be specific. Don't pad.` }]
      })
    });
    const data = await res.json();
    responseDiv.textContent = data.content.map(c => c.text||'').join('');
  } catch(e) { responseDiv.textContent = 'Error. Please try again.'; }
  btn.disabled = false; btn.textContent = 'Evaluate My Answer';
}

renderSidebar();
renderMain();
</script>
</body>
</html>
